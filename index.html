<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEJA GACOR KEMBARQQ</title>

<style>
:root{
    --gold:#FFD700;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100%;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    color:#fff;
    min-height:100dvh;
    padding:20px;

    background-image:
        linear-gradient(
            rgba(0,0,0,.55),
            rgba(0,0,0,.55)
        ),
        url('ajg2.png');

    background-position:center center;
    background-repeat:no-repeat;
    background-size:cover;
    background-attachment:scroll;
}

.container{
    width:min(1200px,100%);
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.logo {
    width: min(450px,80vw);
    height: auto;
    display: block;
    margin: auto;
    /* Menghubungkan logo dengan animasi bernama 'kelapKelip' selama 2 detik secara berulang-ulang */
    animation: kelapKelip 0.9s infinite ease-in-out; 
}

.header p{
    color:#bdbdbd;
    margin-top:10px;
    letter-spacing:1px;
    font-size:clamp(12px,2vw,16px);
}

.footer{
    margin-top:40px;
    text-align:center;
    color:#888;
    font-size:.9rem;
}

/* Gaya Baru untuk Grid dan Card */
.games-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center; /* Membuat card berada di tengah layar */
    margin: 30px auto;
}

.card-link {
    display: block;
    width: min(500px, 100%);
    text-decoration: none;
}

.card {
    position: relative;
    width: 100%;
    background: linear-gradient(135deg, rgba(25, 25, 25, 0.75), rgba(15, 15, 15, 0.9));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 102, 0, 0.2); /* Diubah ke border oranye tipis */
    border-radius: 16px;
    padding: 20px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Efek Glow di Belakang saat Hover */
.card-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 215, 0, 0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
}

.card:hover .card-glow {
    opacity: 1;
}

.card:hover {
    transform: translateY(-5px);
    border-color: rgba(255, 102, 0, 0.7); /* Menyala oranye saat kursor di atasnya */
    box-shadow: 0 10px 30px rgba(255, 68, 0, 0.2); /* Efek bayangan oranye bawah */
}

/* Isi Konten di dalam Card */
.card-content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 15px;
}

.card-icon {
    font-size: 2rem;
    background: rgba(255, 215, 0, 0.1);
    padding: 10px;
    border-radius: 12px;
    border: 1px solid rgba(255, 215, 0, 0.2);
    box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.1);
}

.card-info {
    flex: 1;
}

.card-info h3 {
    color: #ffffff;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.card-info p {
    color: #b0b0b0;
    font-size: 0.85rem;
}

/* Gaya Tombol di Dalam Card */
.card-btn {
    background: linear-gradient(90deg, #FFD700, #FFA500);
    color: #000000;
    font-weight: bold;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    padding: 10px 18px;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
    transition: all 0.3s ease;
}

.card:hover .card-btn {
    background: linear-gradient(90deg, #ffffff, #FFD700);
    box-shadow: 0 4px 20px rgba(255, 215, 0, 0.5);
    transform: scale(1.05);
}

/* Responsif Mobile */
@media(max-width: 480px) {
    .card-content {
        gap: 12px;
    }
    .card-icon {
        font-size: 1.6rem;
        padding: 8px;
    }
    .card-info h3 {
        font-size: 1rem;
    }
    .card-info p {
        font-size: 0.75rem;
    }
    .card-btn {
        padding: 8px 12px;
        font-size: 0.75rem;
    }
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:9999;

    justify-content:center;
    align-items:center;

    padding:20px;
    animation:fadeIn .3s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

.popup-content{
    position:relative;
}

.popup-image{
    width:min(90vw,700px);
    max-height:85vh;
    object-fit:contain;
    border-radius:15px;
    display:block;
    box-shadow:0 0 25px rgba(255,215,0,.5);
}

.close{
    position:absolute;
    top:-15px;
    right:-15px;
    width:35px;
    height:35px;
    border-radius:50%;
    background:var(--gold);
    color:#000;
    text-align:center;
    line-height:35px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

@media(max-width:768px){
    body{
        padding:15px;
    }
}

@media(max-width:480px){
    .logo{
        width:90%;
    }

    .footer{
        font-size:.8rem;
    }
}

/* Animasi Kelap-Kelip Efek Oranye */
@keyframes kelapKelip {
    0%, 100% {
        filter: drop-shadow(0 0 8px rgba(255, 136, 0, 0.5)) 
                brightness(1);
    }
    50% {
        filter: drop-shadow(0 0 25px rgba(255, 68, 0, 0.95)) 
                brightness(1.25); /* Efek berpijar oranye pekat saat mencapai puncak */
    }
}

/* Animasi Card Kelap Kelip */
@keyframes cardKelapKelip {

    0%, 100% {
        box-shadow:
        0 0 10px rgba(255,215,0,0.3),
        0 0 20px rgba(255,140,0,0.2);
        border-color: rgba(255,215,0,0.4);
    }

    50% {
        box-shadow:
        0 0 25px rgba(255,215,0,0.9),
        0 0 45px rgba(255,102,0,0.8),
        0 0 70px rgba(255,69,0,0.5);

        border-color:#FFD700;
    }

}


/* Terapkan ke semua card */
.card {

    animation: cardKelapKelip 0.5s infinite ease-in-out;

}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="ss.png" alt="KEMBARQQ" class="logo">
        <p>SITUS PUSAT PKV TERPERCAYA</p>
    </div>
<div class="games-grid">

    <a href="https://kembarqqjitu.org/" class="card-link" target="_blank" rel="noopener noreferrer">
        <div class="card card-login">
            <div class="card-glow"></div>
            <div class="card-content">
                <div class="card-icon">🔑</div>
                <div class="card-info">
                    <h3>LOGIN UTAMA</h3>
                    <p>Akses cepat ke akun resmi Anda</p>
                </div>
                <div class="card-btn">MASUK</div>
            </div>
        </div>
    </a>

    <a href="https://pkvrtp.dpnel.com" class="card-link" target="_blank" rel="noopener noreferrer">
        <div class="card card-rtp">
            <div class="card-glow"></div>
            <div class="card-content">
                <div class="card-icon">🔥</div>
                <div class="card-info">
                    <h3>RTP & MEJA GACOR</h3>
                    <p>Bocoran pola dan meja persentase tinggi</p>
                </div>
                <div class="card-btn">CEK RTP</div>
            </div>
        </div>
    </a>

    <a href="https://starmpat.com/wakembarqq" class="card-link" target="_blank" rel="noopener noreferrer">
        <div class="card card-cs">
            <div class="card-glow"></div>
            <div class="card-content">
                <div class="card-icon">💬</div>
                <div class="card-info">
                    <h3>LAYANAN 24/7</h3>
                    <p>Hubungi Customer Service WhatsApp</p>
                </div>
                <div class="card-btn">CHATTING</div>
            </div>
        </div>
    </a>

</div>

    <div class="footer">
        © KEMBARQQPKV
    </div>

</div>

<div id="popup" class="popup">
    <div class="popup-content">
        <span class="close">&times;</span>
        <img src="popup.png" alt="Promo" class="popup-image">
    </div>
</div>

<script>
const popup = document.getElementById("popup");
const closeBtn = document.querySelector(".close");

window.addEventListener("load", () => {
    popup.style.display = "flex";
});

closeBtn.addEventListener("click", () => {
    popup.style.display = "none";
});

popup.addEventListener("click", (e) => {
    if (e.target === popup) {
        popup.style.display = "none";
    }
});
</script>

</body>
</html>
